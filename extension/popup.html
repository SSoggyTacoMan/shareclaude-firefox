<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareClaude</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            width: 320px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .icon {
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 12px;
            padding: 8px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .version {
            font-size: 12px;
            opacity: 0.8;
        }

        .instructions {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 16px;
            backdrop-filter: blur(10px);
        }

        .instructions h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .steps {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .steps li {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 14px;
            line-height: 1.5;
        }

        .step-number {
            background: rgba(255, 255, 255, 0.2);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-weight: 600;
            font-size: 12px;
        }

        .share-icon {
            width: 18px;
            height: 18px;
            vertical-align: middle;
            margin: 0 2px;
        }

        .cta {
            background: white;
            color: #667eea;
            padding: 12px 20px;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .cta:hover {
            transform: scale(1.05);
        }

        .footer {
            text-align: center;
            font-size: 12px;
            opacity: 0.8;
            padding-top: 8px;
        }

        .footer a {
            color: white;
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }

        .footer a:hover {
            border-bottom-color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="images/icon-128.png" alt="ShareClaude" class="icon">
            <div>
                <h1>ShareClaude</h1>
                <div class="version">v0.3.3</div>
            </div>
        </div>

        <div class="instructions">
            <h2>How to Use</h2>
            <ol class="steps">
                <li>
                    <span class="step-number">1</span>
                    <span>Open a conversation on <strong>claude.ai</strong></span>
                </li>
                <li>
                    <span class="step-number">2</span>
                    <span>Look for the <svg class="share-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg> share button next to the upload button</span>
                </li>
                <li>
                    <span class="step-number">3</span>
                    <span>Click it to share your conversation!</span>
                </li>
            </ol>
        </div>

        <a href="https://claude.ai" class="cta" target="_blank" id="openClaude">
            Open Claude
        </a>

        <div class="footer">
            <a href="https://shareclaude.pages.dev" target="_blank">Visit ShareClaude</a>
        </div>
    </div>

    <script>
        document.getElementById('openClaude').addEventListener('click', () => {
            browser.tabs.create({ url: 'https://claude.ai' });
        });
    </script>
</body>
</html>
